<style>
  :root {
    --cream: #FAF6E8;
    --cream-deep: #F0E8D0;
    --sage: #7C8B5C;
    --sage-deep: #4A5538;
    --sage-soft: #B5C2A0;
    --mustard: #D4A24A;
    --mustard-soft: #F0D78A;
    --honey: #E8C275;
    --ink: #1F2218;
    --ink-soft: #5A6055;
    --line: #E0D8BE;
    --green-free: #5A8C4F;
    --green-soft: #DCEACE;
    --shadow-soft: 0 4px 20px rgba(74, 85, 56, .08);
    --shadow-card: 0 6px 24px rgba(74, 85, 56, .10);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: linear-gradient(180deg, #FAF6E8 0%, #F0E8D0 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 20px;
    line-height: 1.5;
  }
  .wrap { max-width: 780px; margin: 0 auto; padding: 24px 20px 80px; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #7C8B5C 0%, #4A5538 100%);
    color: var(--cream);
    border-radius: 28px;
    padding: 30px 30px;
    box-shadow: var(--shadow-card);
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
    min-height: 220px;
  }
  header::before {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, var(--mustard-soft) 0%, transparent 70%);
    opacity: .25;
    pointer-events: none;
    z-index: 1;
  }
  .header-content { position: relative; z-index: 2; min-width: 0; max-width: 65%; }
  .header-photo {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 55%;
    z-index: 0;
    opacity: 0.6;
    -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 25%, rgba(0,0,0,0) 100%);
    mask-image: linear-gradient(to left, rgba(0,0,0,1) 25%, rgba(0,0,0,0) 100%);
    pointer-events: none;
  }
  .header-photo img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .header-photo.no-photo { display: none; }
  .place {
    font-size: 1.1rem;
    color: var(--mustard-soft);
    margin: 0 0 6px 0;
    font-weight: 600;
    letter-spacing: .02em;
    text-transform: uppercase;
  }
  h1 {
    margin: 0 0 22px 0;
    font-size: 2.6rem;
    line-height: 1.05;
    letter-spacing: -0.02em;
    font-weight: 800;
  }
  h1 .accent {
    background: linear-gradient(90deg, #F0D78A 0%, #E8C275 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .weather {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .weather-day {
    background: rgba(250, 246, 232, 0.15);
    border: 1px solid rgba(250, 246, 232, 0.25);
    border-radius: 18px;
    padding: 14px 16px;
  }
  .weather-label {
    font-size: .9rem;
    color: var(--mustard-soft);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .weather-temp {
    font-size: 1.9rem;
    font-weight: 800;
    line-height: 1;
    color: var(--cream);
  }
  .weather-icon { font-size: 1.5rem; margin-right: 8px; }
  .weather-desc {
    font-size: .9rem;
    color: var(--cream);
    opacity: .85;
    margin-top: 4px;
  }
  .weather-error {
    font-size: .92rem;
    color: var(--cream);
    opacity: .85;
    line-height: 1.4;
  }

  /* SECTION */
  .section-title {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--sage-deep);
    font-weight: 700;
    margin: 28px 0 14px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: "";
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, var(--sage-soft) 0%, transparent 100%);
  }

  /* FILTERS */
  .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
  .chip {
    background: #FFFFFF;
    border: 2px solid var(--line);
    border-radius: 999px;
    padding: 11px 18px;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    transition: all .15s ease;
    font-family: inherit;
  }
  .chip:hover { border-color: var(--sage); }
  .chip.active {
    background: linear-gradient(135deg, var(--sage) 0%, var(--sage-deep) 100%);
    color: var(--cream);
    border-color: var(--sage-deep);
  }
  .chip.binnenkort {
    background: linear-gradient(135deg, var(--mustard-soft) 0%, var(--honey) 100%);
    border-color: var(--mustard);
    color: #6B4F1A;
  }
  .chip.binnenkort.active {
    background: linear-gradient(135deg, var(--mustard) 0%, #B88532 100%);
    color: #FFF;
    border-color: #B88532;
  }

  /* CARDS */
  .cards { display: grid; gap: 18px; }
  .card {
    background: #FFFFFF;
    border-radius: 22px;
    padding: 24px 26px;
    box-shadow: var(--shadow-card);
    display: grid;
    gap: 12px;
    transition: transform .15s ease;
    position: relative;
  }
  .card.dated { border-left: 6px solid var(--mustard); }
  .card:hover { transform: translateY(-2px); }
  .card-name {
    margin: 0;
    font-size: 1.55rem;
    line-height: 1.2;
    font-weight: 700;
    color: var(--ink);
  }
  .when-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--mustard-soft) 0%, var(--honey) 100%);
    color: #6B4F1A;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: .95rem;
    font-weight: 700;
    width: fit-content;
  }
  .price {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 999px;
    background: linear-gradient(135deg, #FFF1E0 0%, #FFE0B8 100%);
    color: #8A4F0A;
    font-weight: 700;
    font-size: 1rem;
    width: fit-content;
  }
  .price.free {
    background: linear-gradient(135deg, var(--green-soft) 0%, #B8D9A0 100%);
    color: var(--green-free);
    font-size: 1.4rem;
    padding: 10px 22px;
    font-weight: 800;
    letter-spacing: .03em;
  }
  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 1.1rem;
    color: var(--ink);
    font-weight: 600;
  }
  .meta span { display: inline-flex; align-items: center; gap: 6px; }
  .desc {
    margin: 0;
    font-size: 1.02rem;
    color: var(--ink-soft);
    line-height: 1.55;
  }
  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 4px;
  }
  .links a {
    color: var(--sage-deep);
    font-weight: 700;
    text-decoration: none;
    font-size: .98rem;
    border-bottom: 2px solid var(--sage-soft);
    padding-bottom: 1px;
  }
  .links a:hover { border-bottom-color: var(--sage-deep); }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    font-size: .9rem;
    color: var(--sage-deep);
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px 12px;
    font-weight: 500;
  }

  footer {
    margin-top: 40px;
    text-align: center;
    color: var(--ink-soft);
    font-size: .9rem;
  }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-soft);
    font-size: 1.15rem;
    background: #FFFFFF;
    border-radius: 20px;
    box-shadow: var(--shadow-soft);
  }

  @media (max-width: 600px) {
    body { font-size: 18px; }
    h1 { font-size: 2rem; }
    header { padding: 24px 22px; border-radius: 22px; min-height: 200px; }
    .header-content { max-width: 70%; }
    .header-photo { width: 60%; opacity: 0.5; }
    .weather { grid-template-columns: 1fr 1fr; gap: 8px; }
    .weather-temp { font-size: 1.6rem; }
    .wrap { padding: 16px 14px 60px; }
    .card { padding: 20px 20px; }
  }
</style>
</head>

</div>

<script>
// ---------- WEER (Open-Meteo, geen API key nodig) ----------
const WMO = {
  0:  { icon: "☀️", label: "Helder" },
  1:  { icon: "🌤️", label: "Vooral helder" },
  2:  { icon: "⛅", label: "Deels bewolkt" },
  3:  { icon: "☁️", label: "Bewolkt" },
  45: { icon: "🌫️", label: "Mistig" },
  48: { icon: "🌫️", label: "Mistig" },
  51: { icon: "🌦️", label: "Lichte motregen" },
  53: { icon: "🌦️", label: "Motregen" },
  55: { icon: "🌧️", label: "Stevige motregen" },
  61: { icon: "🌧️", label: "Lichte regen" },
  63: { icon: "🌧️", label: "Regen" },
  65: { icon: "🌧️", label: "Stevige regen" },
  71: { icon: "🌨️", label: "Lichte sneeuw" },
  73: { icon: "🌨️", label: "Sneeuw" },
  75: { icon: "❄️", label: "Veel sneeuw" },
  80: { icon: "🌦️", label: "Buien" },
  81: { icon: "🌧️", label: "Stevige buien" },
  82: { icon: "⛈️", label: "Hevige buien" },
  95: { icon: "⛈️", label: "Onweer" },
  96: { icon: "⛈️", label: "Onweer met hagel" },
  99: { icon: "⛈️", label: "Zwaar onweer" }
};

async function loadWeather(lat, lon) {
  const out = document.getElementById("weather");
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe%2FAmsterdam&forecast_days=2`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    const labels = ["Vandaag", "Morgen"];
    out.innerHTML = labels.map((lab, i) => {
      const code = d.daily.weathercode[i];
      const max = Math.round(d.daily.temperature_2m_max[i]);
      const min = Math.round(d.daily.temperature_2m_min[i]);
      const w = WMO[code] || { icon: "❓", label: "" };
      return `
        <div class="weather-day">
          <div class="weather-label">${lab}</div>
          <div class="weather-temp"><span class="weather-icon">${w.icon}</span>${max}°</div>
          <div class="weather-desc">${w.label} · min ${min}°</div>
        </div>`;
    }).join("");
  } catch (e) {
    const isFile = location.protocol === "file:";
    const msg = isFile
      ? "Het weer wordt geladen zodra de pagina online staat."
      : "Weer kon niet geladen worden.";
    out.innerHTML = `<div class="weather-day" style="grid-column: 1 / -1;"><div class="weather-error">${msg}</div></div>`;
  }
}

// ---------- DATUM-LOGICA ----------
const HORIZON_DAYS = 60;

function todayISO() { return new Date().toISOString().slice(0, 10); }
function horizonISO() {
  return new Date(Date.now() + HORIZON_DAYS * 86400000).toISOString().slice(0, 10);
}

// Een activiteit is relevant als:
// - geen datum: altijd
// - met datum: vandaag tot horizon valt binnen [startDate, endDate]
function isCurrentlyRelevant(a) {
  if (!a.startDate && !a.endDate) return true;
  const today = todayISO();
  const horizon = horizonISO();
  if (a.endDate && a.endDate < today) return false;       // verleden
  if (a.startDate && a.startDate > horizon) return false; // te ver in toekomst
  return true;
}

function isDated(a) {
  return Boolean(a.startDate || a.endDate);
}

function formatDateNL(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("nl-NL", { day: "numeric", month: "short" });
}

function whenLabel(a) {
  if (a.when) return a.when;
  if (a.startDate && a.endDate) {
    return formatDateNL(a.startDate) + " – " + formatDateNL(a.endDate);
  }
  if (a.startDate) return "Vanaf " + formatDateNL(a.startDate);
  if (a.endDate)   return "Tot " + formatDateNL(a.endDate);
  return "";
}

// ---------- RENDER ----------
let DATA = null;
let activeFilter = "all";

// Emoji per activiteit op basis van primaire categorie
const EMOJI_PRIORITY = ["events","animals","playground","markets","culture","water","indoor","nature"];
function activityEmoji(a) {
  for (const id of EMOJI_PRIORITY) {
    if ((a.categories || []).includes(id)) {
      const cat = DATA.categories.find(c => c.id === id);
      if (cat) return cat.icon;
    }
  }
  return "🌟";
}

function priceBlock(a) {
  if (a.free) return `<div class="price free">GRATIS</div>`;
  return `<div class="price">${a.priceText || "Betaald"}</div>`;
}
function distanceBlock(a) {
  const km = a.distance.km != null ? `<span>🛣️ ${a.distance.km} km</span>` : "";
  return `
    <div class="meta">
      ${km}
      <span>🚲 ${a.distance.bikeMin} min</span>
      <span>🚗 ${a.distance.carMin} min</span>
    </div>`;
}
function tagsBlock(a, cats) {
  const labels = (a.categories || [])
    .map(id => cats.find(c => c.id === id))
    .filter(c => c && c.id !== "free")
    .map(c => `<span class="tag">${c.icon} ${c.label}</span>`)
    .join("");
  return labels ? `<div class="tags">${labels}</div>` : "";
}
function linksBlock(a) {
  return `
    <div class="links">
      <a href="${a.googleMaps}" target="_blank" rel="noopener">📍 Routebeschrijving</a>
      ${a.website ? `<a href="${a.website}" target="_blank" rel="noopener">🌐 Website</a>` : ""}
    </div>`;
}

function renderCards() {
  const out = document.getElementById("cards");
  // Filter 1: hide stale/distant-future dated items
  let list = DATA.activities.filter(isCurrentlyRelevant);
  // Filter 2: apply chip
  if (activeFilter === "binnenkort") {
    list = list.filter(isDated);
  } else if (activeFilter !== "all") {
    list = list.filter(a => (a.categories || []).includes(activeFilter));
  }
  // Sort
  list = [...list].sort((a, b) => {
    if (activeFilter === "binnenkort") {
      return (a.startDate || "9999").localeCompare(b.startDate || "9999");
    }
    if (activeFilter === "all") {
      // Dated upcoming first, then free, then by drive time
      if (isDated(a) !== isDated(b)) return isDated(a) ? -1 : 1;
      if (a.free !== b.free) return a.free ? -1 : 1;
    }
    return a.distance.carMin - b.distance.carMin;
  });

  // Section heading
  const title = document.getElementById("cardsTitle");
  if (activeFilter === "binnenkort") title.innerHTML = "🕒 Binnenkort";
  else if (activeFilter === "all") title.innerHTML = "🌟 Activiteiten";
  else {
    const cat = DATA.categories.find(c => c.id === activeFilter);
    title.innerHTML = (cat ? cat.icon + " " + cat.label : "Activiteiten");
  }

  if (list.length === 0) {
    const msg = activeFilter === "binnenkort"
      ? "Geen aankomende speciale evenementen gevonden. Check volgende week opnieuw."
      : "Geen activiteiten gevonden voor deze filter.";
    out.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }

  out.innerHTML = list.map(a => {
    const dated = isDated(a);
    return `
      <article class="card ${dated ? "dated" : ""}">
        ${dated ? `<div class="when-badge">🕒 ${whenLabel(a)}</div>` : ""}
        <h3 class="card-name">${activityEmoji(a)} ${a.name}</h3>
        ${priceBlock(a)}
        ${distanceBlock(a)}
        <p class="desc">${a.description}</p>
        ${tagsBlock(a, DATA.categories)}
        ${linksBlock(a)}
      </article>
    `;
  }).join("");
}

function renderFilters() {
  const out = document.getElementById("filters");
  out.innerHTML = DATA.categories.map(c => `
    <button class="chip ${c.id === "binnenkort" ? "binnenkort" : ""} ${c.id === activeFilter ? "active" : ""}" data-id="${c.id}">
      ${c.icon} ${c.label}
    </button>
  `).join("");
  out.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      activeFilter = btn.dataset.id;
      renderFilters();
      renderCards();
    });
  });
}

function formatDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("nl-NL", { day: "numeric", month: "long", year: "numeric" });
}

function loadActivities() {
  try {
    DATA = JSON.parse(document.getElementById("eventsData").textContent);
    document.getElementById("place").textContent = DATA.origin.name;
    const visible = DATA.activities.filter(isCurrentlyRelevant).length;
    document.getElementById("updated").textContent =
      "Laatst bijgewerkt: " + formatDate(DATA.lastUpdated) + " · " + visible + " activiteiten";
    renderFilters();
    renderCards();
    loadWeather(DATA.origin.lat, DATA.origin.lon);
  } catch (e) {
    console.error(e);
    document.getElementById("cards").innerHTML = `<div class="empty">Kon activiteiten niet laden.</div>`;
  }
}

loadActivities();
</script>
